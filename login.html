<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StudyFlow · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #4338ca;
            --primary-glow: rgba(79, 70, 229, 0.25);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-focus: #c7d2fe;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.12);
            --font-body: 'DM Sans', sans-serif;
            --font-display: 'Crimson Pro', serif;
            --radius: 22px;
            --radius-sm: 14px;
            --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 35%, #f1f5f9 70%, #e0e7ff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle animated background shapes */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 420px;
            height: 420px;
            background: var(--primary-glow);
            top: -100px;
            right: -100px;
            animation: floatA 12s ease-in-out infinite;
        }
        body::after {
            width: 340px;
            height: 340px;
            background: rgba(99, 102, 241, 0.15);
            bottom: -80px;
            left: -80px;
            animation: floatB 14s ease-in-out infinite;
        }

        @keyframes floatA {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-40px, 30px) scale(1.08);
            }
            66% {
                transform: translate(20px, -20px) scale(0.94);
            }
        }
        @keyframes floatB {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -35px) scale(1.1);
            }
        }

        /* ---------- Card ---------- */
        .auth-card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 2.8rem 2.4rem 2.2rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            transition: all 0.35s var(--ease-spring);
            backdrop-filter: blur(4px);
            animation: cardEntry 0.5s var(--ease-spring);
        }
        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-card .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .auth-card .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
            box-shadow: 0 6px 18px var(--primary-glow);
        }
        .auth-card .logo-text {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.4px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-card h2 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            text-align: center;
            margin-bottom: 0.25rem;
            font-weight: 700;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        /* ---------- Messages ---------- */
        .alert {
            padding: 0.7rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.84rem;
            font-weight: 500;
            margin-bottom: 1.2rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: slideDown 0.3s var(--ease-spring);
        }
        .alert.show {
            display: flex;
        }
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .alert-warning {
            background: #fffbeb;
            color: #92400e;
            border: 1px solid #fde68a;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- Form ---------- */
        .form-group {
            margin-bottom: 1.15rem;
            position: relative;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 0.35rem;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-tertiary);
            font-size: 1.2rem;
            pointer-events: none;
            transition: color 0.2s;
            z-index: 1;
        }
        .input-wrapper input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            background: var(--bg);
            color: var(--text-primary);
            transition: all 0.25s var(--ease-spring);
            font-family: var(--font-body);
            letter-spacing: 0.01em;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 5px var(--primary-glow);
        }
        .input-wrapper input:focus~.input-icon {
            color: var(--primary);
        }
        .input-wrapper input.error-input {
            border-color: var(--danger);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
            background: #fff5f5;
        }
        .input-wrapper input.valid-input {
            border-color: var(--success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            background: #f0fdf4;
        }
        .input-wrapper .toggle-password {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-tertiary);
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 1.1rem;
            z-index: 1;
            display: flex;
            align-items: center;
        }
        .input-wrapper .toggle-password:hover {
            color: var(--text-secondary);
            background: var(--border);
        }

        /* Password strength */
        .password-strength {
            display: flex;
            gap: 5px;
            margin-top: 0.5rem;
            align-items: center;
        }
        .password-strength .strength-bar {
            flex: 1;
            height: 5px;
            border-radius: 10px;
            background: var(--border);
            transition: all 0.35s var(--ease-spring);
        }
        .password-strength .strength-bar.active.strength-weak {
            background: var(--danger);
        }
        .password-strength .strength-bar.active.strength-fair {
            background: var(--warning);
        }
        .password-strength .strength-bar.active.strength-good {
            background: #3b82f6;
        }
        .password-strength .strength-bar.active.strength-strong {
            background: var(--success);
        }
        .strength-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-tertiary);
            margin-left: 0.4rem;
            min-width: 48px;
            text-align: right;
        }

        /* Remember me & forgot */
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            font-size: 0.82rem;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            user-select: none;
        }
        .remember-me input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .forgot-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .forgot-link:hover {
            opacity: 0.75;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s var(--ease-spring);
            font-family: var(--font-body);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.35);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .btn-primary .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
        }
        .btn-primary.loading .spinner {
            display: inline-block;
        }
        .btn-primary.loading .btn-text {
            display: inline-block;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-tertiary);
            font-size: 0.78rem;
            font-weight: 500;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Social button */
        .btn-social {
            width: 100%;
            padding: 0.75rem;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 40px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s var(--ease-spring);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
        .btn-social:hover {
            border-color: var(--primary-light);
            background: #f8f7ff;
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }
        .btn-social img {
            width: 20px;
            height: 20px;
        }

        /* Toggle text */
        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.88rem;
            color: var(--text-muted);
        }
        .toggle-text a {
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .toggle-text a:hover {
            opacity: 0.75;
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.3rem 1.6rem;
                border-radius: 18px;
            }
            .auth-card .logo-text {
                font-size: 1.6rem;
            }
            .auth-card h2 {
                font-size: 1.4rem;
            }
            .form-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
            </div>
            <span class="logo-text">StudyFlow</span>
        </div>

        <!-- ============ LOGIN FORM ============ -->
        <div id="loginForm">
            <h2>Welcome back</h2>
            <p class="subtitle">Log in to continue your learning flow</p>

            <div id="loginAlert" class="alert"></div>

            <div class="form-group">
                <label for="loginEmail">Email address</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉</span>
                    <input type="text" id="loginEmail" placeholder="you@example.com" autocomplete="email" spellcheck="false">
                </div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>

            <div class="form-row">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a class="forgot-link" href="forgot.html">Forgot password?</a>
            </div>

            <button class="btn-primary" id="loginBtn">
                <span class="spinner"></span><span class="btn-text">Log In</span>
            </button>

            <div class="divider">or continue with</div>
            <button class="btn-social" id="googleLoginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <div class="toggle-text">
                Don't have an account? <a id="showSignup">Create one</a>
            </div>
        </div>

        <!-- ============ SIGNUP FORM ============ -->
        <div id="signupForm" class="hidden">
            <h2>Create account</h2>
            <p class="subtitle">Start your focused study journey</p>

            <div id="signupAlert" class="alert"></div>

            <div class="form-group">
                <label for="signupName">Full Name</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="signupName" placeholder="John Student" autocomplete="name" spellcheck="false">
                </div>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email address</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉</span>
                    <input type="text" id="signupEmail" placeholder="you@example.com" autocomplete="email" spellcheck="false">
                </div>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="signupPassword" placeholder="Create a strong password" autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="signupPassword" aria-label="Toggle password visibility">👁</button>
                </div>
                <div class="password-strength" id="passwordStrengthBars">
                    <div class="strength-bar" data-level="1"></div>
                    <div class="strength-bar" data-level="2"></div>
                    <div class="strength-bar" data-level="3"></div>
                    <div class="strength-bar" data-level="4"></div>
                    <span class="strength-label" id="strengthLabel">—</span>
                </div>
            </div>

            <button class="btn-primary" id="signupBtn">
                <span class="spinner"></span><span class="btn-text">Create Account</span>
            </button>

            <div class="divider">or continue with</div>
            <button class="btn-social" id="googleSignupBtn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <div class="toggle-text">
                Already have an account? <a id="showLogin">Log in</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ DOM REFS ============
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const showSignup = document.getElementById('showSignup');
            const showLogin = document.getElementById('showLogin');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');

            // Login elements
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const loginBtn = document.getElementById('loginBtn');
            const loginAlert = document.getElementById('loginAlert');
            const rememberMe = document.getElementById('rememberMe');

            // Signup elements
            const signupName = document.getElementById('signupName');
            const signupEmail = document.getElementById('signupEmail');
            const signupPassword = document.getElementById('signupPassword');
            const signupBtn = document.getElementById('signupBtn');
            const signupAlert = document.getElementById('signupAlert');
            const strengthBars = document.querySelectorAll('#passwordStrengthBars .strength-bar');
            const strengthLabel = document.getElementById('strengthLabel');

            // ============ VALIDATION PATTERNS ============
            // Comprehensive email regex (RFC 5322 simplified)
            const EMAIL_REGEX = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}$/;

            // Known disposable email domains (commonly used for fake accounts)
            const DISPOSABLE_DOMAINS = new Set([
                'mailinator.com', 'guerrillamail.com', '10minutemail.com', 'tempmail.com',
                'throwaway.email', 'sharklasers.com', 'yopmail.com', 'trashmail.com',
                'fakeinbox.com', 'temp-mail.org', 'emailondeck.com', 'spamgourmet.com',
                'dispostable.com', 'getnada.com', 'maildrop.cc', 'harakirimail.com',
                'mytemp.email', 'tempmail.net', 'throwawaymail.com', 'discard.email',
                'nolog.com', 'trash-mail.com', 'fakeemail.com', 'tempmailaddress.com',
                'guerrillamailblock.com', 'guerrillamail.org', 'guerrillamail.net',
                'guerrillamail.biz', 'spam4.me', 'moakt.com', 'byom.de',
            ]);

            // Common typos of real domains (for helpful suggestions)
            const DOMAIN_TYPOS = {
                'gmial.com': 'gmail.com',
                'gmail.co': 'gmail.com',
                'gmail.cm': 'gmail.com',
                'gmai.com': 'gmail.com',
                'gmal.com': 'gmail.com',
                'gnail.com': 'gmail.com',
                'hotmail.co': 'hotmail.com',
                'hotmail.cm': 'hotmail.com',
                'hotmai.com': 'hotmail.com',
                'outlook.co': 'outlook.com',
                'outlook.cm': 'outlook.com',
                'outlok.com': 'outlook.com',
                'yahoo.co': 'yahoo.com',
                'yahoo.cm': 'yahoo.com',
                'yaho.com': 'yahoo.com',
                'protonmail.co': 'protonmail.com',
                'protonmai.com': 'protonmail.com',
            };

            // Invalid name patterns (must contain at least 2 letters, no excessive numbers/symbols)
            const NAME_REGEX = /^[a-zA-Zà-üÀ-Ü'\- ]{2,60}$/;
            const NAME_MIN_WORDS = 1; // at least one word
            const NAME_MIN_LETTERS = 2; // at least 2 actual letters

            // ============ HELPER FUNCTIONS ============
            function showAlert(alertEl, message, type = 'error') {
                alertEl.textContent = message;
                alertEl.className = `alert alert-${type} show`;
                // Auto-hide after 5 seconds
                clearTimeout(alertEl._timeout);
                alertEl._timeout = setTimeout(() => {
                    alertEl.classList.remove('show');
                }, 5000);
            }

            function hideAlert(alertEl) {
                alertEl.classList.remove('show');
            }

            function setInputState(input, state) {
                input.classList.remove('error-input', 'valid-input');
                if (state === 'error') input.classList.add('error-input');
                else if (state === 'valid') input.classList.add('valid-input');
            }

            function setButtonLoading(btn, isLoading) {
                if (isLoading) {
                    btn.classList.add('loading');
                    btn.querySelector('.btn-text').textContent = 'Please wait...';
                } else {
                    btn.classList.remove('loading');
                }
            }

            // ============ EMAIL VALIDATION ============
            function validateEmail(email, alertEl, inputEl) {
                const trimmed = email.trim().toLowerCase();

                // 1. Empty check
                if (!trimmed) {
                    showAlert(alertEl, 'Please enter your email address.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Email is required.' };
                }

                // 2. Basic format check
                if (!EMAIL_REGEX.test(trimmed)) {
                    showAlert(alertEl, 'Please enter a valid email address (e.g., name@domain.com).', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Invalid email format.' };
                }

                // 3. Extract domain
                const atIndex = trimmed.lastIndexOf('@');
                const domain = trimmed.slice(atIndex + 1);
                const localPart = trimmed.slice(0, atIndex);

                // 4. Check for disposable domains
                if (DISPOSABLE_DOMAINS.has(domain)) {
                    showAlert(alertEl, 'Disposable email addresses are not allowed. Please use a real email.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Disposable email detected.' };
                }

                // 5. Check for domain typos
                if (DOMAIN_TYPOS[domain]) {
                    const suggested = trimmed.replace(domain, DOMAIN_TYPOS[domain]);
                    showAlert(alertEl,
                        `Did you mean <strong>${suggested}</strong>? Please check your email address.`, 'warning');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: `Possible typo. Did you mean ${suggested}?`, suggestion: suggested };
                }

                // 6. Check for obviously fake local parts
                const fakeLocalPatterns = [
                    /^test/i, /^fake/i, /^asdf/i, /^qwer/i, /^12345/, /^aaaa/i,
                    /^noreply/i, /^no-reply/i, /^donotreply/i, /^spam/i, /^null/i,
                    /^undefined/i, /^example/i, /^sample/i, /^demo/i, /^user/i,
                ];
                for (const pattern of fakeLocalPatterns) {
                    if (pattern.test(localPart)) {
                        showAlert(alertEl, 'Please enter your real email address, not a test or placeholder.', 'warning');
                        setInputState(inputEl, 'error');
                        return { valid: false, message: 'Email appears to be a placeholder.' };
                    }
                }

                // 7. Domain must have at least one dot and valid TLD
                if (!domain.includes('.') || domain.split('.').pop().length < 2) {
                    showAlert(alertEl, 'Please enter a complete email domain (e.g., gmail.com).', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Incomplete domain.' };
                }

                // 8. Local part sanity
                if (localPart.length < 1 || localPart.length > 64) {
                    showAlert(alertEl, 'The email username seems too short or too long.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Invalid local part length.' };
                }

                // Passed all checks
                setInputState(inputEl, 'valid');
                hideAlert(alertEl);
                return { valid: true, message: 'Email looks good.' };
            }

            // ============ NAME VALIDATION ============
            function validateName(name, alertEl, inputEl) {
                const trimmed = name.trim();

                if (!trimmed) {
                    showAlert(alertEl, 'Please enter your full name.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Name is required.' };
                }

                // Count actual letters
                const letterCount = (trimmed.match(/[a-zA-Zà-üÀ-Ü]/g) || []).length;
                if (letterCount < NAME_MIN_LETTERS) {
                    showAlert(alertEl, 'Please enter a real name with at least 2 letters.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Name too short.' };
                }

                // Check for excessive numbers or symbols
                const invalidChars = trimmed.match(/[^a-zA-Zà-üÀ-Ü'\- ]/g);
                if (invalidChars && invalidChars.length > 0) {
                    showAlert(alertEl, 'Name should only contain letters, spaces, hyphens, or apostrophes.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Name contains invalid characters.' };
                }

                // Check for repeated characters (keyboard smash detection)
                if (/(.)\1{4,}/.test(trimmed.toLowerCase())) {
                    showAlert(alertEl, 'Please enter your real name (no repeated characters).', 'warning');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Name appears invalid (repeated characters).' };
                }

                // Check for only one extremely short word
                const words = trimmed.split(/\s+/).filter(w => w.length > 0);
                if (words.length === 1 && words[0].length < 3) {
                    showAlert(alertEl, 'Please enter both your first and last name.', 'warning');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Please provide full name.' };
                }

                // Check for random-looking strings (all consonants or all vowels pattern)
                const consonantsOnly = /^[bcdfghjklmnpqrstvwxyz]+$/i;
                if (words.length === 1 && consonantsOnly.test(words[0]) && words[0].length > 4) {
                    showAlert(alertEl, 'Please enter your real name, not a random string.', 'warning');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Name appears to be random characters.' };
                }

                setInputState(inputEl, 'valid');
                hideAlert(alertEl);
                return { valid: true, message: 'Name looks good.' };
            }

            // ============ PASSWORD VALIDATION ============
            function getPasswordStrength(password) {
                let score = 0;
                if (password.length >= 6) score++;
                if (password.length >= 10) score++;
                if (/[A-Z]/.test(password)) score++;
                if (/[0-9]/.test(password)) score++;
                if (/[^a-zA-Z0-9]/.test(password)) score++;
                if (password.length >= 14) score++;
                // Cap at 4 for the 4 bars
                return Math.min(4, Math.floor(score * 0.8));
            }

            function updatePasswordStrengthUI(password) {
                const strength = getPasswordStrength(password);
                const labels = ['Weak', 'Fair', 'Good', 'Strong'];
                const classes = ['strength-weak', 'strength-fair', 'strength-good', 'strength-strong'];

                strengthBars.forEach((bar, i) => {
                    bar.classList.remove('active', 'strength-weak', 'strength-fair', 'strength-good',
                    'strength-strong');
                    if (password.length > 0 && i < strength) {
                        bar.classList.add('active', classes[strength - 1]);
                    }
                });

                if (password.length === 0) {
                    strengthLabel.textContent = '—';
                    strengthLabel.style.color = 'var(--text-tertiary)';
                } else if (strength === 0) {
                    strengthLabel.textContent = 'Too short';
                    strengthLabel.style.color = 'var(--danger)';
                } else {
                    strengthLabel.textContent = labels[strength - 1] || 'Weak';
                    strengthLabel.style.color = `var(--${['danger','warning','#3b82f6','success'][strength-1]})`;
                }
            }

            function validatePassword(password, alertEl, inputEl) {
                if (!password) {
                    showAlert(alertEl, 'Please create a password.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Password is required.' };
                }
                if (password.length < 6) {
                    showAlert(alertEl, 'Password must be at least 6 characters long.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Password too short (min 6 characters).' };
                }
                if (password.length > 128) {
                    showAlert(alertEl, 'Password is too long (max 128 characters).', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Password too long.' };
                }
                // Common weak passwords
                const weakPasswords = ['password', '123456', '12345678', 'qwerty', 'abc123', 'letmein',
                    'monkey', 'football', 'iloveyou', 'admin', 'welcome', 'passw0rd', '123456789',
                    'password1', 'studyflow', 'study', 'flow'
                ];
                if (weakPasswords.includes(password.toLowerCase().trim())) {
                    showAlert(alertEl, 'That password is too common. Please choose a stronger one.', 'warning');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Password is too common.' };
                }
                setInputState(inputEl, 'valid');
                hideAlert(alertEl);
                return { valid: true, message: 'Password strength acceptable.' };
            }

            // ============ PASSWORD TOGGLE ============
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    if (input) {
                        const isPassword = input.type === 'password';
                        input.type = isPassword ? 'text' : 'password';
                        btn.textContent = isPassword ? '🙈' : '👁';
                    }
                });
            });

            // ============ REAL-TIME VALIDATION (SIGNUP) ============
            signupName.addEventListener('blur', () => {
                const val = signupName.value.trim();
                if (val) validateName(val, signupAlert, signupName);
            });
            signupName.addEventListener('input', () => {
                if (signupName.classList.contains('error-input') || signupName.classList.contains(
                        'valid-input')) {
                    const val = signupName.value.trim();
                    if (val) validateName(val, signupAlert, signupName);
                    else setInputState(signupName, '');
                }
            });

            signupEmail.addEventListener('blur', () => {
                const val = signupEmail.value.trim();
                if (val) validateEmail(val, signupAlert, signupEmail);
            });
            signupEmail.addEventListener('input', () => {
                if (signupEmail.classList.contains('error-input') || signupEmail.classList.contains(
                        'valid-input')) {
                    const val = signupEmail.value.trim();
                    if (val) validateEmail(val, signupAlert, signupEmail);
                    else setInputState(signupEmail, '');
                }
            });

            signupPassword.addEventListener('input', () => {
                updatePasswordStrengthUI(signupPassword.value);
                if (signupPassword.classList.contains('error-input') || signupPassword.classList.contains(
                        'valid-input')) {
                    const val = signupPassword.value;
                    if (val) validatePassword(val, signupAlert, signupPassword);
                    else setInputState(signupPassword, '');
                }
            });
            signupPassword.addEventListener('blur', () => {
                const val = signupPassword.value;
                if (val) validatePassword(val, signupAlert, signupPassword);
            });

            // ============ REAL-TIME VALIDATION (LOGIN) ============
            loginEmail.addEventListener('blur', () => {
                const val = loginEmail.value.trim();
                if (val) validateEmail(val, loginAlert, loginEmail);
            });
            loginEmail.addEventListener('input', () => {
                if (loginEmail.classList.contains('error-input') || loginEmail.classList.contains('valid-input')) {
                    const val = loginEmail.value.trim();
                    if (val) validateEmail(val, loginAlert, loginEmail);
                    else setInputState(loginEmail, '');
                }
            });

            // ============ FORM TOGGLES ============
            function switchToSignup() {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                hideAlert(loginAlert);
                hideAlert(signupAlert);
                setInputState(loginEmail, '');
                setInputState(loginPassword, '');
                loginBtn.querySelector('.btn-text').textContent = 'Log In';
                setButtonLoading(loginBtn, false);
                signupBtn.querySelector('.btn-text').textContent = 'Create Account';
                setButtonLoading(signupBtn, false);
                // Focus on name field
                setTimeout(() => signupName.focus(), 150);
            }

            function switchToLogin() {
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                hideAlert(loginAlert);
                hideAlert(signupAlert);
                setInputState(signupName, '');
                setInputState(signupEmail, '');
                setInputState(signupPassword, '');
                updatePasswordStrengthUI('');
                signupBtn.querySelector('.btn-text').textContent = 'Create Account';
                setButtonLoading(signupBtn, false);
                loginBtn.querySelector('.btn-text').textContent = 'Log In';
                setButtonLoading(loginBtn, false);
                setTimeout(() => loginEmail.focus(), 150);
            }

            showSignup.addEventListener('click', switchToSignup);
            showLogin.addEventListener('click', switchToLogin);

            // ============ LOGIN SUBMIT ============
            loginBtn.addEventListener('click', async () => {
                hideAlert(loginAlert);
                const email = loginEmail.value.trim();
                const password = loginPassword.value;

                // --- Validate ---
                const emailResult = validateEmail(email, loginAlert, loginEmail);
                if (!emailResult.valid) { loginEmail.focus(); return; }

                if (!password) {
                    showAlert(loginAlert, 'Please enter your password.', 'error');
                    setInputState(loginPassword, 'error');
                    loginPassword.focus();
                    return;
                }
                setInputState(loginPassword, 'valid');
            
                // --- Call the REAL Backend ---
                setButtonLoading(loginBtn, true);
            
                try {
                    const response = await fetch('https://studyflow-2kcz.onrender.com/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                
                    const data = await response.json();
                
                    if (!response.ok) {
                        // Server returned an error (e.g., 401 Invalid credentials)
                        showAlert(loginAlert, data.error || 'Login failed. Please try again.', 'error');
                        setButtonLoading(loginBtn, false);
                        return;
                    }
                
                    // --- SUCCESS! ---
                    // Store the token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Initialize stats for this user
                    await initStats(data.user.id);

                    // If "Remember Me" is checked, we could set a longer expiry, but we already have 7d from JWT.
                    // So we just save it.
                
                    showAlert(loginAlert, '✅ Login successful! Redirecting...', 'success');
                    setButtonLoading(loginBtn, false);
                
                    // Redirect to the dashboard (index.html)
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                
                } catch (error) {
                    // Network error (backend not running, CORS, etc.)
                    console.error('Login fetch error:', error);
                    showAlert(loginAlert, '❌ Cannot connect to server. Is the backend running on port 5000?', 'error');
                    setButtonLoading(loginBtn, false);
                }
            });

            // Enter key support
            loginPassword.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginBtn.click();
            });
            loginEmail.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginPassword.focus();
            });

            // ============ SIGNUP SUBMIT ============
            signupBtn.addEventListener('click', async () => {
                hideAlert(signupAlert);
                const name = signupName.value.trim();
                const email = signupEmail.value.trim();
                const password = signupPassword.value;
                        
                // --- Validate ---
                const nameResult = validateName(name, signupAlert, signupName);
                if (!nameResult.valid) { signupName.focus(); return; }
                        
                const emailResult = validateEmail(email, signupAlert, signupEmail);
                if (!emailResult.valid) {
                    signupEmail.focus();
                    if (emailResult.suggestion) {
                        signupEmail.value = emailResult.suggestion;
                        validateEmail(emailResult.suggestion, signupAlert, signupEmail);
                    }
                    return;
                }
            
                const passwordResult = validatePassword(password, signupAlert, signupPassword);
                if (!passwordResult.valid) { signupPassword.focus(); return; }
            
                // --- Call the REAL Backend ---
                setButtonLoading(signupBtn, true);
            
                try {
                    const response = await fetch('https://studyflow-2kcz.onrender.com/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });
                
                    const data = await response.json();
                
                    if (!response.ok) {
                        // Server returned an error (e.g., 400 Email already exists)
                        showAlert(signupAlert, data.error || 'Signup failed. Please try again.', 'error');
                        setButtonLoading(signupBtn, false);
                        return;
                    }
                
                    // --- SUCCESS! ---
                    // Store the token and user data (user is automatically logged in after signup)
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                
                    showAlert(signupAlert, '🎉 Account created successfully! Redirecting...', 'success');
                    setButtonLoading(signupBtn, false);
                
                    // Redirect to the dashboard (index.html)
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                
                } catch (error) {
                    // Network error
                    console.error('Signup fetch error:', error);
                    showAlert(signupAlert, '❌ Cannot connect to server. Is the backend running on port 5000?', 'error');
                    setButtonLoading(signupBtn, false);
                }
            });

            // Enter key support
            signupPassword.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signupBtn.click();
            });
            signupName.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signupEmail.focus();
            });
            signupEmail.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signupPassword.focus();
            });

            // ============ FORGOT PASSWORD ============
            forgotPasswordLink.addEventListener('click', () => {
                const email = loginEmail.value.trim();
                if (email && EMAIL_REGEX.test(email)) {
                    showAlert(loginAlert, `📧 Password reset link sent to <strong>${email}</strong>!`,
                        'success');
                } else {
                    showAlert(loginAlert,
                        'Please enter your email address first, then click "Forgot password?" again.',
                        'warning');
                    loginEmail.focus();
                }
            });

            // ============ GOOGLE AUTH (Placeholder) ============
            function handleGoogleAuth(source) {
                console.log(`🔑 Google sign-in triggered from: ${source}`);
                showAlert(source === 'login' ? loginAlert : signupAlert,
                    '🔑 Google authentication would open here. (Connect Google OAuth to enable.)',
                    'success');
                // In production: window.location.href = '/auth/google';
            }
            document.getElementById('googleLoginBtn').addEventListener('click', () => handleGoogleAuth('login'));
            document.getElementById('googleSignupBtn').addEventListener('click', () => handleGoogleAuth('signup'));

            // ============ INITIAL FOCUS ============
            loginEmail.focus();

            console.log('📘 StudyFlow Auth — Ready');
            console.log('   ✅ Email validation with disposable domain & typo detection');
            console.log('   ✅ Name validation with fake-name heuristics');
            console.log('   ✅ Password strength meter (4 levels)');
            console.log('   ✅ Real-time input feedback');
            console.log('   ✅ Forgot password flow');
            console.log('   ✅ Google OAuth placeholder');
        })();
    </script>
</body>
</html>
