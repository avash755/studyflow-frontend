<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyFlow · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ---------- Minimal styles ---------- */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-card {
            background: white;
            border-radius: 22px;
            padding: 2.8rem 2.4rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            border: 1px solid #e2e8f0;
        }
        .logo { display:flex; align-items:center; gap:0.75rem; justify-content:center; margin-bottom:2rem; text-decoration:none; color:#0f172a; }
        .logo-icon { width:48px; height:48px; background:linear-gradient(135deg, #4f46e5, #6366f1); border-radius:15px; display:flex; align-items:center; justify-content:center; color:white; font-size:1.6rem; }
        .logo-text { font-family:'Crimson Pro', serif; font-size:2rem; font-weight:700; background:linear-gradient(135deg, #4338ca, #4f46e5); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        h2 { font-family:'Crimson Pro', serif; font-size:1.75rem; text-align:center; }
        .subtitle { text-align:center; color:#64748b; font-size:0.9rem; margin-bottom:2rem; }
        .alert { padding:0.7rem 1rem; border-radius:14px; font-size:0.84rem; margin-bottom:1.2rem; display:none; }
        .alert.show { display:block; }
        .alert-error { background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; }
        .alert-success { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
        .form-group { margin-bottom:1.15rem; }
        .form-group label { display:block; font-weight:600; font-size:0.82rem; margin-bottom:0.35rem; color:#475569; }
        .form-group input { width:100%; padding:0.75rem 1rem; border:2px solid #e2e8f0; border-radius:14px; font-size:0.95rem; background:#f8fafc; transition:border 0.2s; }
        .form-group input:focus { outline:none; border-color:#4f46e5; box-shadow:0 0 0 5px rgba(79,70,229,0.2); }
        .btn-primary { width:100%; padding:0.85rem; background:linear-gradient(135deg, #4f46e5, #6366f1); border:none; border-radius:40px; color:white; font-weight:700; font-size:1rem; cursor:pointer; transition:all 0.3s; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(79,70,229,0.35); }
        .btn-primary.loading { opacity:0.7; pointer-events:none; }
        .btn-primary .spinner { display:none; width:20px; height:20px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; margin-right:8px; }
        .btn-primary.loading .spinner { display:inline-block; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .toggle-text { text-align:center; margin-top:1.5rem; font-size:0.88rem; color:#64748b; }
        .toggle-text a { color:#4f46e5; font-weight:700; cursor:pointer; text-decoration:none; }
        .toggle-text a:hover { text-decoration:underline; }
        .hidden { display:none !important; }
        .legal-links { margin-top:2rem; text-align:center; font-size:0.7rem; color:#94a3b8; }
        .legal-links a { color:#64748b; text-decoration:none; margin:0 0.5rem; }
        .legal-links a:hover { color:#4f46e5; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="index.html" class="logo">
            <div class="logo-icon">📘</div>
            <span class="logo-text">StudyFlow</span>
        </a>

        <!-- Login Form -->
        <div id="loginForm">
            <h2>Welcome back</h2>
            <p class="subtitle">Log in to continue your learning flow</p>
            <div id="loginAlert" class="alert"></div>
            <div class="form-group">
                <label for="loginEmail">Email address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" />
            </div>
            <button class="btn-primary" id="loginBtn">
                <span class="spinner"></span> Log In
            </button>
            <div class="toggle-text">Don't have an account? <a id="showSignup">Create one</a></div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <h2>Create account</h2>
            <p class="subtitle">Start your focused study journey</p>
            <div id="signupAlert" class="alert"></div>
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="John Student" />
            </div>
            <div class="form-group">
                <label for="signupEmail">Email address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create a strong password" />
            </div>
            <button class="btn-primary" id="signupBtn">
                <span class="spinner"></span> Create Account
            </button>
            <div class="toggle-text">Already have an account? <a id="showLogin">Log in</a></div>
        </div>

        <div class="legal-links">
            <a href="#">Privacy Policy</a> · <a href="#">Terms of Service</a>
        </div>
    </div>

    <script>
        // ========== IMPORTANT: Your backend URL ==========
        const API_BASE = 'https://studyflow-2kcz.onrender.com';

        // ========== DOM Refs ==========
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const showSignup = document.getElementById('showSignup');
        const showLogin = document.getElementById('showLogin');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const loginAlert = document.getElementById('loginAlert');
        const signupName = document.getElementById('signupName');
        const signupEmail = document.getElementById('signupEmail');
        const signupPassword = document.getElementById('signupPassword');
        const signupBtn = document.getElementById('signupBtn');
        const signupAlert = document.getElementById('signupAlert');

        // ========== Toggle Forms ==========
        showSignup.addEventListener('click', () => {
            loginForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
            loginAlert.classList.remove('show');
            signupAlert.classList.remove('show');
        });
        showLogin.addEventListener('click', () => {
            signupForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            loginAlert.classList.remove('show');
            signupAlert.classList.remove('show');
        });

        // ========== Helpers ==========
        function showAlert(el, msg, type = 'error') {
            el.textContent = msg;
            el.className = `alert alert-${type} show`;
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function setLoading(btn, isLoading) {
            if (isLoading) {
                btn.classList.add('loading');
                btn.querySelector('.spinner').style.display = 'inline-block';
            } else {
                btn.classList.remove('loading');
                btn.querySelector('.spinner').style.display = 'none';
            }
        }

        // ========== initStats (calls the backend to create stats row) ==========
        async function initStats(userId, token) {
            try {
                await fetch(`${API_BASE}/api/stats/init`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId })
                });
                console.log('✅ Stats initialized for user:', userId);
            } catch (err) {
                console.warn('Stats init failed (non-critical):', err);
            }
        }

        // ========== LOGIN ==========
        loginBtn.addEventListener('click', async () => {
            loginAlert.classList.remove('show');
            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            if (!email || !password) {
                showAlert(loginAlert, 'Please fill in all fields.', 'error');
                return;
            }

            setLoading(loginBtn, true);

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert(loginAlert, data.error || 'Login failed.', 'error');
                    setLoading(loginBtn, false);
                    return;
                }

                // Save token and user
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Initialize stats for this user
                await initStats(data.user.id, data.token);

                // Redirect to dashboard
                window.location.href = 'app.html';
            } catch (err) {
                console.error('Login error:', err);
                showAlert(loginAlert, '❌ Cannot connect to server. Check your internet.', 'error');
                setLoading(loginBtn, false);
            }
        });

        // ========== SIGNUP ==========
        signupBtn.addEventListener('click', async () => {
            signupAlert.classList.remove('show');
            const name = signupName.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value;

            if (!name || !email || !password) {
                showAlert(signupAlert, 'All fields are required.', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert(signupAlert, 'Password must be at least 6 characters.', 'error');
                return;
            }

            setLoading(signupBtn, true);

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert(signupAlert, data.error || 'Signup failed.', 'error');
                    setLoading(signupBtn, false);
                    return;
                }

                // Save token and user
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Initialize stats for this user
                await initStats(data.user.id, data.token);

                // Redirect to dashboard
                window.location.href = 'app.html';
            } catch (err) {
                console.error('Signup error:', err);
                showAlert(signupAlert, '❌ Cannot connect to server. Check your internet.', 'error');
                setLoading(signupBtn, false);
            }
        });

        // Enter key support
        loginPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });
        signupPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') signupBtn.click(); });
    </script>
</body>
</html>
