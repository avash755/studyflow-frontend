<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StudyFlow · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #4338ca;
            --primary-glow: rgba(79, 70, 229, 0.25);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-focus: #c7d2fe;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.12);
            --font-body: 'DM Sans', sans-serif;
            --font-display: 'Crimson Pro', serif;
            --radius: 22px;
            --radius-sm: 14px;
            --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 35%, #f1f5f9 70%, #e0e7ff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 420px;
            height: 420px;
            background: var(--primary-glow);
            top: -100px;
            right: -100px;
            animation: floatA 12s ease-in-out infinite;
        }
        body::after {
            width: 340px;
            height: 340px;
            background: rgba(99, 102, 241, 0.15);
            bottom: -80px;
            left: -80px;
            animation: floatB 14s ease-in-out infinite;
        }

        @keyframes floatA {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-40px, 30px) scale(1.08);
            }
            66% {
                transform: translate(20px, -20px) scale(0.94);
            }
        }
        @keyframes floatB {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -35px) scale(1.1);
            }
        }

        .auth-card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 2.8rem 2.4rem 2.2rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            transition: all 0.35s var(--ease-spring);
            backdrop-filter: blur(4px);
            animation: cardEntry 0.5s var(--ease-spring);
        }
        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-card .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .auth-card .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
            box-shadow: 0 6px 18px var(--primary-glow);
        }
        .auth-card .logo-text {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.4px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-card h2 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            text-align: center;
            margin-bottom: 0.25rem;
            font-weight: 700;
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .alert {
            padding: 0.7rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.84rem;
            font-weight: 500;
            margin-bottom: 1.2rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: slideDown 0.3s var(--ease-spring);
        }
        .alert.show {
            display: flex;
        }
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .alert-warning {
            background: #fffbeb;
            color: #92400e;
            border: 1px solid #fde68a;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.15rem;
            position: relative;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 0.35rem;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-tertiary);
            font-size: 1.2rem;
            pointer-events: none;
            transition: color 0.2s;
            z-index: 1;
        }
        .input-wrapper input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            background: var(--bg);
            color: var(--text-primary);
            transition: all 0.25s var(--ease-spring);
            font-family: var(--font-body);
            letter-spacing: 0.01em;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 5px var(--primary-glow);
        }
        .input-wrapper input:focus~.input-icon {
            color: var(--primary);
        }
        .input-wrapper input.error-input {
            border-color: var(--danger);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
            background: #fff5f5;
        }
        .input-wrapper input.valid-input {
            border-color: var(--success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            background: #f0fdf4;
        }
        .input-wrapper .toggle-password {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-tertiary);
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 1.1rem;
            z-index: 1;
            display: flex;
            align-items: center;
        }
        .input-wrapper .toggle-password:hover {
            color: var(--text-secondary);
            background: var(--border);
        }

        .password-strength {
            display: flex;
            gap: 5px;
            margin-top: 0.5rem;
            align-items: center;
        }
        .password-strength .strength-bar {
            flex: 1;
            height: 5px;
            border-radius: 10px;
            background: var(--border);
            transition: all 0.35s var(--ease-spring);
        }
        .password-strength .strength-bar.active.strength-weak {
            background: var(--danger);
        }
        .password-strength .strength-bar.active.strength-fair {
            background: var(--warning);
        }
        .password-strength .strength-bar.active.strength-good {
            background: #3b82f6;
        }
        .password-strength .strength-bar.active.strength-strong {
            background: var(--success);
        }
        .strength-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-tertiary);
            margin-left: 0.4rem;
            min-width: 48px;
            text-align: right;
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            font-size: 0.82rem;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            user-select: none;
        }
        .remember-me input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .forgot-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .forgot-link:hover {
            opacity: 0.75;
        }

        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s var(--ease-spring);
            font-family: var(--font-body);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.35);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .btn-primary .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
        }
        .btn-primary.loading .spinner {
            display: inline-block;
        }
        .btn-primary.loading .btn-text {
            display: inline-block;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-tertiary);
            font-size: 0.78rem;
            font-weight: 500;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-social {
            width: 100%;
            padding: 0.75rem;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 40px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s var(--ease-spring);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
        .btn-social:hover {
            border-color: var(--primary-light);
            background: #f8f7ff;
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }
        .btn-social img {
            width: 20px;
            height: 20px;
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.88rem;
            color: var(--text-muted);
        }
        .toggle-text a {
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .toggle-text a:hover {
            opacity: 0.75;
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.3rem 1.6rem;
                border-radius: 18px;
            }
            .auth-card .logo-text {
                font-size: 1.6rem;
            }
            .auth-card h2 {
                font-size: 1.4rem;
            }
            .form-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <div class="logo-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
            </div>
            <span class="logo-text">StudyFlow</span>
        </div>

        <!-- ============ LOGIN FORM ============ -->
        <div id="loginForm">
            <h2>Welcome back</h2>
            <p class="subtitle">Log in to continue your learning flow</p>

            <div id="loginAlert" class="alert"></div>

            <div class="form-group">
                <label for="loginEmail">Email address</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉</span>
                    <input type="text" id="loginEmail" placeholder="you@example.com" autocomplete="email" spellcheck="false">
                </div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>

            <div class="form-row">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a class="forgot-link" href="forgot.html">Forgot password?</a>
            </div>

            <button class="btn-primary" id="loginBtn">
                <span class="spinner"></span><span class="btn-text">Log In</span>
            </button>

            <div class="divider">or continue with</div>
            <button class="btn-social" id="googleLoginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <div class="toggle-text">
                Don't have an account? <a id="showSignup">Create one</a>
            </div>
        </div>

        <!-- ============ SIGNUP FORM ============ -->
        <div id="signupForm" class="hidden">
            <h2>Create account</h2>
            <p class="subtitle">Start your focused study journey</p>

            <div id="signupAlert" class="alert"></div>

            <div class="form-group">
                <label for="signupName">Full Name</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="signupName" placeholder="John Student" autocomplete="name" spellcheck="false">
                </div>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email address</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉</span>
                    <input type="text" id="signupEmail" placeholder="you@example.com" autocomplete="email" spellcheck="false">
                </div>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="signupPassword" placeholder="Create a strong password" autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="signupPassword" aria-label="Toggle password visibility">👁</button>
                </div>
                <div class="password-strength" id="passwordStrengthBars">
                    <div class="strength-bar" data-level="1"></div>
                    <div class="strength-bar" data-level="2"></div>
                    <div class="strength-bar" data-level="3"></div>
                    <div class="strength-bar" data-level="4"></div>
                    <span class="strength-label" id="strengthLabel">—</span>
                </div>
            </div>

            <button class="btn-primary" id="signupBtn">
                <span class="spinner"></span><span class="btn-text">Create Account</span>
            </button>

            <div class="divider">or continue with</div>
            <button class="btn-social" id="googleSignupBtn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <div class="toggle-text">
                Already have an account? <a id="showLogin">Log in</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ API BASE ============
            const API_BASE = 'https://studyflow-2kcz.onrender.com';

            // ============ DOM REFS ============
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const showSignup = document.getElementById('showSignup');
            const showLogin = document.getElementById('showLogin');

            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const loginBtn = document.getElementById('loginBtn');
            const loginAlert = document.getElementById('loginAlert');
            const rememberMe = document.getElementById('rememberMe');

            const signupName = document.getElementById('signupName');
            const signupEmail = document.getElementById('signupEmail');
            const signupPassword = document.getElementById('signupPassword');
            const signupBtn = document.getElementById('signupBtn');
            const signupAlert = document.getElementById('signupAlert');
            const strengthBars = document.querySelectorAll('#passwordStrengthBars .strength-bar');
            const strengthLabel = document.getElementById('strengthLabel');

            // ============ VALIDATION ============
            const EMAIL_REGEX = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}$/;

            function showAlert(alertEl, message, type = 'error') {
                alertEl.textContent = message;
                alertEl.className = `alert alert-${type} show`;
                clearTimeout(alertEl._timeout);
                alertEl._timeout = setTimeout(() => {
                    alertEl.classList.remove('show');
                }, 5000);
            }

            function hideAlert(alertEl) {
                alertEl.classList.remove('show');
            }

            function setInputState(input, state) {
                input.classList.remove('error-input', 'valid-input');
                if (state === 'error') input.classList.add('error-input');
                else if (state === 'valid') input.classList.add('valid-input');
            }

            function setButtonLoading(btn, isLoading) {
                if (isLoading) {
                    btn.classList.add('loading');
                    btn.querySelector('.btn-text').textContent = 'Please wait...';
                } else {
                    btn.classList.remove('loading');
                    btn.querySelector('.btn-text').textContent = btn.id === 'loginBtn' ? 'Log In' : 'Create Account';
                }
            }

            function validateEmail(email, alertEl, inputEl) {
                const trimmed = email.trim().toLowerCase();
                if (!trimmed) {
                    showAlert(alertEl, 'Please enter your email address.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Email is required.' };
                }
                if (!EMAIL_REGEX.test(trimmed)) {
                    showAlert(alertEl, 'Please enter a valid email address.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Invalid email format.' };
                }
                setInputState(inputEl, 'valid');
                hideAlert(alertEl);
                return { valid: true };
            }

            function validatePassword(password, alertEl, inputEl) {
                if (!password) {
                    showAlert(alertEl, 'Please create a password.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Password is required.' };
                }
                if (password.length < 6) {
                    showAlert(alertEl, 'Password must be at least 6 characters long.', 'error');
                    setInputState(inputEl, 'error');
                    return { valid: false, message: 'Password too short.' };
                }
                setInputState(inputEl, 'valid');
                hideAlert(alertEl);
                return { valid: true };
            }

            // ============ PASSWORD TOGGLE ============
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    if (input) {
                        const isPassword = input.type === 'password';
                        input.type = isPassword ? 'text' : 'password';
                        btn.textContent = isPassword ? '🙈' : '👁';
                    }
                });
            });

            // ============ FORM TOGGLES ============
            function switchToSignup() {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                hideAlert(loginAlert);
                hideAlert(signupAlert);
                setInputState(loginEmail, '');
                setInputState(loginPassword, '');
                setButtonLoading(loginBtn, false);
                setButtonLoading(signupBtn, false);
                setTimeout(() => signupName.focus(), 150);
            }

            function switchToLogin() {
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                hideAlert(loginAlert);
                hideAlert(signupAlert);
                setInputState(signupName, '');
                setInputState(signupEmail, '');
                setInputState(signupPassword, '');
                setButtonLoading(loginBtn, false);
                setButtonLoading(signupBtn, false);
                setTimeout(() => loginEmail.focus(), 150);
            }

            showSignup.addEventListener('click', switchToSignup);
            showLogin.addEventListener('click', switchToLogin);

            // ============ LOGIN ============
            loginBtn.addEventListener('click', async () => {
                hideAlert(loginAlert);
                const email = loginEmail.value.trim();
                const password = loginPassword.value;

                const emailResult = validateEmail(email, loginAlert, loginEmail);
                if (!emailResult.valid) { loginEmail.focus(); return; }

                if (!password) {
                    showAlert(loginAlert, 'Please enter your password.', 'error');
                    setInputState(loginPassword, 'error');
                    loginPassword.focus();
                    return;
                }
                setInputState(loginPassword, 'valid');

                setButtonLoading(loginBtn, true);

                try {
                    const response = await fetch(`${API_BASE}/api/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        showAlert(loginAlert, data.error || 'Login failed. Please try again.', 'error');
                        setButtonLoading(loginBtn, false);
                        return;
                    }

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showAlert(loginAlert, '✅ Login successful! Redirecting...', 'success');
                    setButtonLoading(loginBtn, false);

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);

                } catch (error) {
                    console.error('Login fetch error:', error);
                    showAlert(loginAlert, '❌ Cannot connect to server. Is the backend running?', 'error');
                    setButtonLoading(loginBtn, false);
                }
            });

            loginPassword.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginBtn.click();
            });
            loginEmail.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginPassword.focus();
            });

            // ============ SIGNUP ============
            signupBtn.addEventListener('click', async () => {
                hideAlert(signupAlert);
                const name = signupName.value.trim();
                const email = signupEmail.value.trim();
                const password = signupPassword.value;

                if (!name) {
                    showAlert(signupAlert, 'Please enter your full name.', 'error');
                    signupName.focus();
                    return;
                }
                const emailResult = validateEmail(email, signupAlert, signupEmail);
                if (!emailResult.valid) { signupEmail.focus(); return; }
                const passwordResult = validatePassword(password, signupAlert, signupPassword);
                if (!passwordResult.valid) { signupPassword.focus(); return; }

                setButtonLoading(signupBtn, true);

                try {
                    const response = await fetch(`${API_BASE}/api/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        showAlert(signupAlert, data.error || 'Signup failed. Please try again.', 'error');
                        setButtonLoading(signupBtn, false);
                        return;
                    }

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Initialize stats for the new user
                    try {
                        await fetch(`${API_BASE}/api/stats/init`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${data.token}`
                            },
                            body: JSON.stringify({ userId: data.user.id })
                        });
                    } catch (statsErr) {
                        console.log('Stats init (optional):', statsErr);
                    }

                    showAlert(signupAlert, '🎉 Account created successfully! Redirecting...', 'success');
                    setButtonLoading(signupBtn, false);

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);

                } catch (error) {
                    console.error('Signup fetch error:', error);
                    showAlert(signupAlert, '❌ Cannot connect to server. Is the backend running?', 'error');
                    setButtonLoading(signupBtn, false);
                }
            });

            signupPassword.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signupBtn.click();
            });
            signupName.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signupEmail.focus();
            });
            signupEmail.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signupPassword.focus();
            });

            // ============ GOOGLE AUTH (Placeholder) ============
            document.getElementById('googleLoginBtn').addEventListener('click', () => {
                showAlert(loginAlert, '🔑 Google authentication coming soon!', 'success');
            });
            document.getElementById('googleSignupBtn').addEventListener('click', () => {
                showAlert(signupAlert, '🔑 Google authentication coming soon!', 'success');
            });

            // ============ INITIAL FOCUS ============
            loginEmail.focus();
            console.log('📘 StudyFlow Auth — Ready (API_BASE:', API_BASE, ')');
        })();
    </script>
</body>
</html>
