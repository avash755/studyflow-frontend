<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyFlow · Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 22px;
            padding: 2.5rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
            border: 1px solid #e2e8f0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .logo-text {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 0.35rem;
            color: #475569;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #f8fafc;
            transition: border 0.2s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.15);
        }
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.35);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .alert {
            padding: 0.7rem 1rem;
            border-radius: 14px;
            font-size: 0.84rem;
            font-weight: 500;
            margin-bottom: 1.2rem;
            display: none;
        }
        .alert.show {
            display: block;
        }
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #4f46e5;
            font-weight: 600;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .strength-bar {
            display: flex;
            gap: 5px;
            margin-top: 0.5rem;
        }
        .strength-bar .bar {
            flex: 1;
            height: 5px;
            border-radius: 10px;
            background: #e2e8f0;
            transition: background 0.3s;
        }
        .strength-bar .bar.active.weak {
            background: #ef4444;
        }
        .strength-bar .bar.active.fair {
            background: #f59e0b;
        }
        .strength-bar .bar.active.good {
            background: #3b82f6;
        }
        .strength-bar .bar.active.strong {
            background: #10b981;
        }
        .strength-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #94a3b8;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔑</div>
            <span class="logo-text">StudyFlow</span>
        </div>
        <h2>Set New Password</h2>
        <p class="subtitle">Enter your new password below.</p>

        <div id="alert" class="alert"></div>

        <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="•••••••• (min 6 chars)" />
            <div class="strength-bar" id="strengthBars">
                <div class="bar" data-index="1"></div>
                <div class="bar" data-index="2"></div>
                <div class="bar" data-index="3"></div>
                <div class="bar" data-index="4"></div>
            </div>
            <div class="strength-label" id="strengthLabel">—</div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" />
        </div>
        <button class="btn" id="resetBtn">Reset Password</button>
        <a href="login.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        const API_BASE = 'https://studyflow-2kcz.onrender.com';
        const newPass = document.getElementById('newPassword');
        const confirmPass = document.getElementById('confirmPassword');
        const resetBtn = document.getElementById('resetBtn');
        const alertEl = document.getElementById('alert');
        const bars = document.querySelectorAll('#strengthBars .bar');
        const label = document.getElementById('strengthLabel');

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showAlert('❌ No reset token found. Please request a new reset link.', 'error');
        }

        function showAlert(msg, type = 'error') {
            alertEl.textContent = msg;
            alertEl.className = `alert alert-${type} show`;
            clearTimeout(alertEl._timeout);
            alertEl._timeout = setTimeout(() => alertEl.classList.remove('show'), 6000);
        }

        function getStrength(password) {
            let score = 0;
            if (password.length >= 6) score++;
            if (password.length >= 10) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;
            return Math.min(4, Math.floor(score * 0.8));
        }

        newPass.addEventListener('input', () => {
            const strength = getStrength(newPass.value);
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            const classes = ['weak', 'fair', 'good', 'strong'];
            bars.forEach((bar, i) => {
                bar.classList.remove('active', 'weak', 'fair', 'good', 'strong');
                if (newPass.value.length > 0 && i < strength) {
                    bar.classList.add('active', classes[strength - 1]);
                }
            });
            label.textContent = newPass.value.length === 0 ? '—' : labels[strength - 1] || 'Weak';
        });

        resetBtn.addEventListener('click', async () => {
            if (!token) {
                showAlert('No reset token found. Please request a new reset link.', 'error');
                return;
            }

            const password = newPass.value;
            const confirm = confirmPass.value;

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('Passwords do not match.', 'error');
                return;
            }

            resetBtn.textContent = 'Resetting...';
            resetBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/auth/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });

                const data = await response.json();
                if (!response.ok) {
                    showAlert(data.error || 'Failed to reset password.', 'error');
                    resetBtn.textContent = 'Reset Password';
                    resetBtn.disabled = false;
                    return;
                }

                showAlert('✅ Password reset successfully! Redirecting to login...', 'success');
                resetBtn.textContent = 'Redirecting...';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                console.error(err);
                showAlert('Could not connect to server.', 'error');
                resetBtn.textContent = 'Reset Password';
                resetBtn.disabled = false;
            }
        });

        confirmPass.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') resetBtn.click();
        });
        newPass.focus();
    </script>
</body>
</html>
