<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyFlow · Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 22px;
            padding: 2.5rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
            border: 1px solid #e2e8f0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .logo-text {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 0.35rem;
            color: #475569;
        }
        input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #f8fafc;
            transition: border 0.2s;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.15);
        }
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.35);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .alert {
            padding: 0.7rem 1rem;
            border-radius: 14px;
            font-size: 0.84rem;
            font-weight: 500;
            margin-bottom: 1.2rem;
            display: none;
        }
        .alert.show {
            display: block;
        }
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #4f46e5;
            font-weight: 600;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">📘</div>
            <span class="logo-text">StudyFlow</span>
        </div>
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your email and we'll send you a reset link.</p>

        <div id="alert" class="alert"></div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <button class="btn" id="resetBtn">Send Reset Link</button>
        <a href="login.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        const API_BASE = 'https://studyflow-2kcz.onrender.com'; // Your Render URL
        const emailInput = document.getElementById('email');
        const resetBtn = document.getElementById('resetBtn');
        const alertEl = document.getElementById('alert');

        function showAlert(msg, type = 'error') {
            alertEl.textContent = msg;
            alertEl.className = `alert alert-${type} show`;
            clearTimeout(alertEl._timeout);
            alertEl._timeout = setTimeout(() => alertEl.classList.remove('show'), 6000);
        }

        resetBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (!email) {
                showAlert('Please enter your email address.', 'error');
                return;
            }

            resetBtn.textContent = 'Sending...';
            resetBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/auth/forgot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                if (!response.ok) {
                    showAlert(data.error || 'Something went wrong.', 'error');
                    resetBtn.textContent = 'Send Reset Link';
                    resetBtn.disabled = false;
                    return;
                }

                showAlert('📧 If an account exists, a reset link has been sent.', 'success');
                resetBtn.textContent = 'Send Reset Link';
                resetBtn.disabled = false;
                emailInput.value = '';
            } catch (err) {
                console.error(err);
                showAlert('Could not connect to server.', 'error');
                resetBtn.textContent = 'Send Reset Link';
                resetBtn.disabled = false;
            }
        });

        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') resetBtn.click();
        });
        emailInput.focus();
    </script>
</body>
</html>
